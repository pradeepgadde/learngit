<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git, Actually — A Handwritten Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f7f2e6;
  --paper-2:#f2ecdc;
  --rule-blue:#b9cfe0;
  --margin-red:#e8a0a0;
  --ink:#2c3e50;
  --ink-blue:#25446e;
  --ink-red:#af3428;
  --ink-green:#2f6b4f;
  --hi-yellow:#fff1a8;
  --hi-green:#c7e8b5;
  --hi-pink:#ffd3dc;
  --hi-blue:#c9e4f6;
  --sticky-orange:#ffc98b;
  --pencil:#5a5a52;
  --font-display:'Kalam', cursive;
  --font-body:'Patrick Hand', cursive;
  --font-annotate:'Caveat', cursive;
  --w:1280px;
  --h:720px;
}
*{box-sizing:border-box;}
html,body{
  margin:0; padding:0; width:100%; height:100%;
  background:#1c1c1c;
  overflow:hidden;
  font-family:var(--font-body);
}
#stage-wrap{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
}
#stage{
  position:relative;
  width:var(--w); height:var(--h);
  transform-origin:center center;
  box-shadow:0 20px 60px rgba(0,0,0,0.55);
}
.slide{
  position:absolute; inset:0;
  width:100%; height:100%;
  background:
    repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 37px,
      var(--rule-blue) 37px, var(--rule-blue) 39px
    ),
    radial-gradient(ellipse at 15% 8%, rgba(255,255,255,0.5), transparent 45%),
    var(--paper);
  background-position: 0 92px, 0 0, 0 0;
  border-radius:4px;
  display:none;
  padding:56px 70px 50px 128px;
  color:var(--ink);
}
.slide.active{ display:block; }
/* spiral binder margin */
.slide::before{
  content:"";
  position:absolute; left:78px; top:0; bottom:0; width:2px;
  background:var(--margin-red);
  opacity:0.55;
}
.slide::after{
  content:"";
  position:absolute; left:16px; top:0; bottom:0; width:52px;
  background-image: radial-gradient(circle, #d8d2bd 0 5px, transparent 6px);
  background-size:52px 46px;
  background-position: 0 30px;
  background-repeat: repeat-y;
  opacity:0.9;
  filter: drop-shadow(1px 1px 0px rgba(0,0,0,0.08));
}
/* chrome: eyebrow + page counter */
.chrome-top{
  position:absolute; top:22px; left:128px; right:60px;
  display:flex; justify-content:space-between; align-items:baseline;
  font-family:var(--font-annotate); color:var(--pencil); font-size:20px;
}
.chrome-top .eyebrow{ letter-spacing:0.5px; }
.chrome-bottom{
  position:absolute; bottom:14px; left:128px; right:60px;
  display:flex; justify-content:space-between; align-items:center;
  font-family:var(--font-annotate); color:var(--pencil); font-size:19px;
}
.progress-track{ flex:1; height:6px; margin:0 16px; background:rgba(0,0,0,0.08); border-radius:4px; overflow:hidden; }
.progress-fill{ height:100%; background:var(--ink-blue); opacity:0.5; border-radius:4px; transition:width .35s ease; }
.content-area{
  position:absolute; top:64px; bottom:56px; left:128px; right:60px;
  overflow:hidden;
}
h1.slide-title{
  font-family:var(--font-display); font-weight:700;
  font-size:52px; color:var(--ink-blue); margin:0 0 6px 0;
  line-height:1.05;
}
.underline-scribble{ display:block; width:210px; height:16px; margin-top:2px; }
p.subtitle{ font-size:24px; color:var(--pencil); margin:6px 0 0 0; font-family:var(--font-annotate); }
.svg-label{ font-family:var(--font-annotate); }

/* sticky note / highlight boxes */
.sticky{
  background:var(--sticky-orange);
  padding:14px 18px; border-radius:2px 10px 3px 9px;
  box-shadow:2px 4px 8px rgba(0,0,0,0.18);
  font-family:var(--font-annotate); font-size:22px; color:#43331a;
  display:inline-block; transform:rotate(-1.2deg);
}
.hi{ padding:1px 6px; border-radius:3px; }
.hi-y{ background:var(--hi-yellow); }
.hi-g{ background:var(--hi-green); }
.hi-p{ background:var(--hi-pink); }
.hi-b{ background:var(--hi-blue); }

/* nav buttons */
.nav-btn{
  position:fixed; top:50%; transform:translateY(-50%);
  width:52px; height:52px; border-radius:50%;
  background:rgba(255,255,255,0.85); border:2px solid var(--ink-blue);
  color:var(--ink-blue); font-size:26px; font-family:var(--font-display);
  cursor:pointer; z-index:50; display:flex; align-items:center; justify-content:center;
  transition:transform .15s ease, background .15s ease;
  user-select:none;
}
.nav-btn:hover{ background:#fff; transform:translateY(-50%) scale(1.08); }
#prevBtn{ left:18px; }
#nextBtn{ right:18px; }
.click-zone{ position:fixed; top:0; bottom:0; width:6%; z-index:10; cursor:pointer; }
#clickLeft{ left:0; } #clickRight{ right:0; }

#pageJump{
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  font-family:var(--font-annotate); color:#cbb; background:rgba(255,255,255,0.08);
  padding:6px 14px; border-radius:20px; font-size:15px; z-index:50; letter-spacing:0.3px;
}
@media (max-width:700px){
  .nav-btn{ width:40px; height:40px; font-size:20px; }
  #pageJump{ font-size:12px; }
}
</style>
</head>
<body>
<div id="stage-wrap">
  <div id="stage"></div>
</div>
<div class="click-zone" id="clickLeft"></div>
<div class="click-zone" id="clickRight"></div>
<button class="nav-btn" id="prevBtn" aria-label="Previous slide">‹</button>
<button class="nav-btn" id="nextBtn" aria-label="Next slide">›</button>
<div id="pageJump">← → to navigate · f for fullscreen</div>

/* ============================= SHARED SVG BITS ============================= */
const ARROW_DEFS = `<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
  </marker>
</defs>`;

function box(x,y,w,h,fill,stroke,rot){
  rot = rot||0;
  return `<g transform="rotate(${rot} ${x+w/2} ${y+h/2})">
    <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="9" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/>
    <rect x="${x+2}" y="${y+2}" width="${w-4}" height="${h-4}" rx="7" fill="none" stroke="${stroke}" stroke-width="1" opacity="0.35"/>
  </g>`;
}
function lbl(x,y,text,opts){
  opts = opts||{};
  const size=opts.size||22, color=opts.color||'var(--ink)', weight=opts.bold?'700':'400', anchor=opts.anchor||'middle', family=opts.display?'var(--font-display)':'var(--font-annotate)';
  return `<text x="${x}" y="${y}" text-anchor="${anchor}" font-family="${family}" font-weight="${weight}" font-size="${size}" fill="${color}">${text}</text>`;
}
function curve(x1,y1,x2,y2,color,dash,cy){
  cy = cy!==undefined?cy:(y1+y2)/2 - 26;
  const cx=(x1+x2)/2;
  return `<path d="M${x1},${y1} Q${cx},${cy} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="2.5" ${dash?'stroke-dasharray="6,7"':''} marker-end="url(#arrow)" style="color:${color}"/>`;
}
function straight(x1,y1,x2,y2,color,dash){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="2.5" ${dash?'stroke-dasharray="6,7"':''} marker-end="url(#arrow)" style="color:${color}"/>`;
}
function dot(x,y,r,fill,stroke){ return `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="${stroke||'var(--ink-blue)'}" stroke-width="2.5"/>`; }

  <h1 class="slide-title">${s.title}</h1>${SCRIB}
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:24px;">
    <div style="background:var(--hi-blue);padding:20px 24px;border-radius:6px 18px 6px 18px;transform:rotate(-0.8deg);box-shadow:3px 5px 10px rgba(0,0,0,0.15);">
      <div style="font-family:var(--font-display);font-weight:700;font-size:30px;color:var(--ink-blue);">${s.left.h}</div>
      <div style="font-family:var(--font-annotate);font-size:18px;color:var(--pencil);margin-bottom:10px;">${s.left.sub}</div>
      ${s.left.pts.map(p=>`<div style="font-size:19px;padding:3px 0;">✓ ${p}</div>`).join('')}
    </div>
    <div style="background:var(--hi-pink);padding:20px 24px;border-radius:18px 6px 18px 6px;transform:rotate(0.8deg);box-shadow:3px 5px 10px rgba(0,0,0,0.15);">
      <div style="font-family:var(--font-display);font-weight:700;font-size:30px;color:var(--ink-red);">${s.right.h}</div>
      <div style="font-family:var(--font-annotate);font-size:18px;color:var(--pencil);margin-bottom:10px;">${s.right.sub}</div>
      ${s.right.pts.map(p=>`<div style="font-size:19px;padding:3px 0;">✓ ${p}</div>`).join('')}
    </div>
  </div>
  ${s.verdict?`<div style="margin-top:22px;">${chip(s.verdict)}</div>`:''}`;

T.commands = s => `
  <div style="font-family:var(--font-annotate);font-size:19px;color:var(--ink-red);">${s.kicker}</div>
  <h1 class="slide-title">${s.title}</h1>${SCRIB}
  <p style="font-size:19px;color:var(--pencil);max-width:900px;margin:8px 0 16px 0;">${s.intro}</p>
  <div style="background:#2b2b26;border-radius:10px;padding:18px 22px;box-shadow:4px 6px 0 rgba(0,0,0,0.2);">
    ${s.rows.map(r=>`
      <div style="display:flex;gap:22px;padding:7px 0;border-bottom:1px dashed rgba(255,255,255,0.15);align-items:baseline;">
        <code style="font-family:'Courier New',monospace;font-size:18px;color:#a8e6a3;white-space:nowrap;">${r.cmd}</code>
        <span style="font-family:var(--font-annotate);font-size:18px;color:#f0e9d2;">— ${r.d}</span>
      </div>`).join('')}
  </div>
  ${s.tip?`<div style="margin-top:20px;">${chip(s.tip)}</div>`:''}`;

T.end = s => `
  <div style="display:flex;gap:50px;align-items:flex-start;height:100%;">
    <div style="flex:1;">
      <h1 class="slide-title" style="font-size:56px;">${s.title}</h1>${SCRIB}
      <div style="margin-top:20px;">
        ${s.recap.map(r=>`<div style="font-size:20px;padding:4px 0;">✎ ${r}</div>`).join('')}
      </div>
      <div style="margin-top:26px;">${chip(s.sign,'var(--hi-green)')}</div>
    </div>
    <div style="flex:1;">
      <div style="font-family:var(--font-display);font-size:22px;color:var(--ink-blue);margin-bottom:8px;">Cheat Sheet</div>
      <div style="background:#2b2b26;border-radius:10px;padding:14px 18px;box-shadow:4px 6px 0 rgba(0,0,0,0.2);">
        ${s.cheat.map(c=>`<div style="display:flex;justify-content:space-between;gap:10px;padding:4px 0;border-bottom:1px dashed rgba(255,255,255,0.15);">
          <code style="font-family:'Courier New',monospace;font-size:15px;color:#a8e6a3;">${c[0]}</code>
          <span style="font-family:var(--font-annotate);font-size:15px;color:#f0e9d2;">${c[1]}</span></div>`).join('')}
      </div>
    </div>
    <div style="width:110px;flex:none;">${s.icon}</div>
  </div>`;

/* ============================= ENGINE ============================= */
const stage = document.getElementById('stage');
let idx = 0;

function renderSlide(i){
  const s = slides[i];
  const wrap = document.createElement('div');
  wrap.className = 'slide active';
  const top = s.type==='title'||s.type==='toc'||s.type==='divider'||s.type==='end' ? '' :
    `<div class="chrome-top"><span class="eyebrow">${s.kicker||''}</span></div>`;
  wrap.innerHTML = top + `<div class="content-area" style="${(s.type==='title'||s.type==='divider'||s.type==='end')?'top:34px;':''}">${T[s.type](s)}</div>`;
  stage.innerHTML = '';
  stage.appendChild(wrap);
  const dots = document.createElement('div');
  dots.className='chrome-bottom';
  dots.innerHTML = `<span>Page ${i+1} / ${slides.length}</span>
    <div class="progress-track"><div class="progress-fill" style="width:${((i+1)/slides.length*100).toFixed(1)}%"></div></div>
    <span>${moduleName(i)}</span>`;
  stage.appendChild(dots);
}
function moduleName(i){
  const s=slides[i];
  if(s.kicker) return s.kicker;
  if(s.type==='divider') return 'Module '+s.num;
  if(s.type==='title') return 'Start';
  if(s.type==='toc') return 'Roadmap';
  if(s.type==='end') return 'Fin.';
  return '';
}
function go(n){
  idx = Math.max(0, Math.min(slides.length-1, n));
  renderSlide(idx);
}
document.getElementById('nextBtn').addEventListener('click', ()=>go(idx+1));
document.getElementById('prevBtn').addEventListener('click', ()=>go(idx-1));
document.getElementById('clickLeft').addEventListener('click', ()=>go(idx-1));
document.getElementById('clickRight').addEventListener('click', ()=>go(idx+1));
window.addEventListener('keydown', e=>{
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){ go(idx+1); e.preventDefault(); }
  if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){ go(idx-1); e.preventDefault(); }
  if(e.key==='Home') go(0);
  if(e.key==='End') go(slides.length-1);
  if(e.key==='f'){ document.documentElement.requestFullscreen && document.documentElement.requestFullscreen(); }
});
/* touch swipe */
let touchX=null;
window.addEventListener('touchstart', e=>{ touchX=e.touches[0].clientX; });
window.addEventListener('touchend', e=>{
  if(touchX===null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(dx>60) go(idx-1);
  if(dx<-60) go(idx+1);
  touchX=null;
});
/* responsive scaling */
function scaleStage(){
  const vw = window.innerWidth, vh = window.innerHeight;
  const scale = Math.min(vw/1280, vh/720) * 0.94;
  stage.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', scaleStage);
scaleStage();
renderSlide(0);
</script>
</body>
</html>
